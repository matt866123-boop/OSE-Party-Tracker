<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>OSE Campaign Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;800&family=Alegreya:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0c0c14;color:#d4cfc4;font-family:'Alegreya','Palatino',Georgia,serif;font-size:15px;-webkit-tap-highlight-color:transparent;}
input,textarea,button,select{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a2735;border-radius:3px;}
input:focus,textarea:focus{border-color:rgba(201,169,110,0.3)!important;outline:none;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
.tab-bar{display:flex;border-bottom:1px solid #2a2735;padding:0 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes pinPulse{0%,100%{box-shadow:0 0 4px rgba(201,169,110,0.4);}50%{box-shadow:0 0 12px rgba(201,169,110,0.7);}}

.cin{font-family:'Cinzel',Georgia,serif;}
.lbl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#7a7568;margin-bottom:3px;font-family:'Cinzel',Georgia,serif;}
.inp{width:100%;padding:7px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:#d4cfc4;font-size:14px;font-family:inherit;outline:none;}
.inp-sm{padding:4px 6px;width:52px;font-size:14px;text-align:center;font-weight:700;}
.ta{resize:vertical;font-size:13px;}
.btn{cursor:pointer;border:none;font-family:'Cinzel',Georgia,serif;}
.card{background:#16151f;border:1px solid #2a2735;border-radius:10px;padding:14px;margin-bottom:8px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.flex{display:flex;align-items:center;}
.gap4{gap:4px;}.gap6{gap:6px;}.gap8{gap:8px;}
.mb6{margin-bottom:6px;}.mb8{margin-bottom:8px;}.mb10{margin-bottom:10px;}
.w100{width:100%;}

.section-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;cursor:pointer;font-family:'Cinzel',Georgia,serif;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.section-body{padding:10px 12px;margin-left:6px;margin-top:4px;}
.tab-btn{flex:none;padding:10px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:#555;cursor:pointer;font-family:'Cinzel',Georgia,serif;font-size:11px;font-weight:700;white-space:nowrap;}
.tab-btn.active{border-bottom-color:#c9a96e;color:#c9a96e;}
.add-btn{width:100%;margin-top:12px;padding:12px;background:rgba(201,169,110,0.08);border:2px dashed rgba(201,169,110,0.2);border-radius:10px;color:#c9a96e;cursor:pointer;font-family:'Cinzel',Georgia,serif;font-size:14px;font-weight:700;}
.remove-btn{background:rgba(196,64,64,0.1);border:1px solid rgba(196,64,64,0.2);border-radius:5px;color:#c44040;cursor:pointer;padding:3px 8px;font-size:11px;}
.hp-minus{flex:1;padding:5px 0;background:rgba(196,64,64,0.12);border:1px solid rgba(196,64,64,0.25);border-radius:6px;color:#c44040;cursor:pointer;font-weight:700;font-size:12px;}
.hp-plus{flex:1;padding:5px 0;background:rgba(74,140,92,0.12);border:1px solid rgba(74,140,92,0.25);border-radius:6px;color:#4a8c5c;cursor:pointer;font-weight:700;font-size:12px;}
.hp-rest{flex:1;padding:5px 0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#7a7568;cursor:pointer;font-weight:600;font-size:12px;}
.hp-bar-track{width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.hp-bar-fill{height:100%;border-radius:3px;transition:width 0.3s;}
.speed-btn{flex:1;padding:6px 0;border-radius:5px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#555;}
.speed-btn.active{background:rgba(201,169,110,0.12);border-color:rgba(201,169,110,0.35);color:#c9a96e;}
.slot-btn{width:20px;height:20px;border-radius:4px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#7a7568;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.slot-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;transition:all 0.15s;border:2px solid #555;background:transparent;}
.slot-dot.filled{background:#c9a96e;border-color:#c9a96e;}

.map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:5;transition:filter 0.15s;}
.map-pin:hover{filter:brightness(1.3);}
.map-pin svg{width:100%;height:100%;display:block;}
.map-pin-glyph{width:100%;height:100%;display:block;}
.map-pin-icon{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:16px solid #e85d5d;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
.map-pin-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;font-family:'Cinzel',Georgia,serif;font-weight:700;color:#fff;background:rgba(0,0,0,0.7);padding:1px 5px;border-radius:3px;pointer-events:none;}
.pin-popup{position:fixed;left:-9999px;top:-9999px;z-index:10000;background:#1e1d2a;border:1px solid #c9a96e;border-radius:10px;padding:10px;width:190px;max-width:calc(100vw - 24px);box-shadow:0 8px 32px rgba(0,0,0,0.65);transform:translate(-50%,calc(-100% - 14px));}
.pin-popup input[type=range]{min-width:0;}

.dice-fab{position:fixed;bottom:20px;right:16px;z-index:100;}
.dice-main{width:56px;height:56px;border-radius:50%;border:2px solid #c9a96e;background:#1e1d2a;color:#c9a96e;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:transform 0.2s;}
.dice-opt{position:absolute;right:6px;width:44px;height:44px;border-radius:50%;cursor:pointer;font-family:'Cinzel',Georgia,serif;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.dice-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e1d2a;border-radius:12px;padding:14px 36px;z-index:1000;text-align:center;animation:fadeIn 0.15s ease;}

.npc-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:'Cinzel',Georgia,serif;text-transform:uppercase;letter-spacing:0.05em;}
.tag-ally{background:rgba(74,140,92,0.15);color:#4a8c5c;border:1px solid rgba(74,140,92,0.3);}
.tag-neutral{background:rgba(201,169,110,0.12);color:#c9a96e;border:1px solid rgba(201,169,110,0.25);}
.tag-hostile{background:rgba(196,64,64,0.12);color:#c44040;border:1px solid rgba(196,64,64,0.25);}
.tag-unknown{background:rgba(255,255,255,0.04);color:#555;border:1px solid rgba(255,255,255,0.08);}

.note-entry{background:#16151f;border:1px solid #2a2735;border-radius:8px;padding:12px;margin-bottom:8px;}
.note-date{font-size:10px;color:#555;font-family:'Cinzel',Georgia,serif;}
.note-title{font-family:'Cinzel',Georgia,serif;font-weight:700;color:#c9a96e;font-size:15px;margin-bottom:4px;}
.dungeon-pin{will-change:transform;}
body.dragging{overflow:hidden!important;touch-action:none!important;}
body.dragging *{touch-action:none!important;}
.turn-fab{position:fixed;bottom:20px;left:16px;z-index:100;}
.turn-fab-btn{width:48px;height:48px;border-radius:50%;border:2px solid #c9a96e;background:#1e1d2a;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);font-size:18px;color:#c9a96e;}
.turn-panel{position:fixed;bottom:80px;left:16px;z-index:101;width:340px;max-width:calc(100vw - 32px);max-height:calc(100vh - 120px);overflow-y:auto;background:#1e1d2a;border:1px solid #c9a96e;border-radius:12px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.turn-row{display:flex;align-items:center;gap:6px;padding:6px 8px;background:rgba(255,255,255,0.02);border-radius:6px;margin-bottom:4px;}
.turn-warn{padding:6px 10px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:6px;text-align:center;font-size:12px;color:#ef4444;font-weight:700;margin-bottom:6px;animation:pinPulse 1.5s infinite;}

body.play-mode-active .dice-fab{zoom:var(--play-ui-scale,1);transform-origin:bottom right;}
body.play-mode-active .turn-fab{zoom:var(--play-ui-scale,1);transform-origin:bottom left;}
body.play-mode-active .dice-toast{zoom:var(--play-ui-scale,1);transform-origin:top center;}

/* PLAY MODE PROTOTYPE */
body.play-mode-active{overflow:hidden!important;position:fixed;width:100%;height:100%;}
body.play-mode-active .dice-fab,body.play-mode-active .turn-fab{z-index:6600!important;}
body.play-mode-active .dice-toast{z-index:6800!important;}
.play-shell{position:fixed;inset:0;z-index:5000;background:#05050a;color:#d4cfc4;overflow:hidden;touch-action:auto;font-size:calc(15px * var(--play-ui-scale,1));}
body:not(.play-mode-active) #app{zoom:var(--global-ui-scale,1);transform-origin:top left;}
.play-map-wrap{position:absolute;inset:0;background:#05050a;overflow:hidden;}
.play-topbar{position:fixed;top:8px;left:8px;right:8px;z-index:6400;display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px;background:rgba(20,19,30,.86);border:1px solid rgba(201,169,110,.22);border-radius:10px;backdrop-filter:blur(8px);box-shadow:0 8px 28px rgba(0,0,0,.4);zoom:var(--play-ui-scale,1);transform-origin:top left;} .play-mini-topbar{position:fixed;top:8px;left:8px;z-index:6400;display:flex;gap:6px;padding:6px;background:rgba(20,19,30,.86);border:1px solid rgba(201,169,110,.22);border-radius:10px;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.45);zoom:var(--play-ui-scale,1);transform-origin:top left;}
.play-select,.play-btn{height:30px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:7px;color:#d4cfc4;font-size:12px;padding:0 8px;font-family:'Cinzel',Georgia,serif;font-weight:700;}
.play-btn{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
.play-btn.gold{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.32);color:#c9a96e;}
.play-btn.red{background:rgba(196,64,64,.12);border-color:rgba(196,64,64,.28);color:#c44040;}
.play-map-container{position:absolute;inset:0;overflow:auto;background:#05050a;-webkit-overflow-scrolling:touch;touch-action:none;cursor:grab;}
.play-map-container.drag-panning{cursor:grabbing;}
.play-map-pad{min-width:100%;min-height:100%;display:block;padding:86px 18px 96px;box-sizing:border-box;text-align:center;}
.play-shell.ui-hidden .play-map-pad{padding:86px 18px 96px;}
.play-map-container #map-inner,.play-map-container #dungeon-inner{display:inline-block;text-align:left;margin:0 auto;vertical-align:top;}
.play-toolstrip{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:6400;display:flex;align-items:center;gap:6px;max-width:calc(100vw - 24px);overflow-x:auto;padding:7px;background:rgba(20,19,30,.88);border:1px solid rgba(201,169,110,.22);border-radius:999px;backdrop-filter:blur(8px);box-shadow:0 8px 28px rgba(0,0,0,.45);zoom:var(--play-ui-scale,1);transform-origin:bottom center;}
.play-side-tab{position:fixed;z-index:6350;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;text-orientation:mixed;padding:10px 7px;background:rgba(30,29,42,.88);border:1px solid rgba(201,169,110,.25);color:#c9a96e;border-radius:8px;font-family:'Cinzel',Georgia,serif;font-size:11px;font-weight:800;letter-spacing:.06em;cursor:pointer;backdrop-filter:blur(8px);zoom:var(--play-ui-scale,1);transform-origin:center;}
.play-left-tab{left:6px;}.play-right-tab{right:6px;}
.play-drawer{position:fixed;top:54px;bottom:92px;z-index:6450;width:min(390px,86vw);min-width:210px;min-height:180px;max-width:calc(100vw - 12px);max-height:calc(100vh - 18px);overflow:auto;background:rgba(22,21,31,.96);border:1px solid rgba(201,169,110,.22);box-shadow:0 8px 32px rgba(0,0,0,.65);padding:12px;backdrop-filter:blur(9px);zoom:var(--play-ui-scale,1);transform-origin:top left;}
.play-drawer.left{left:8px;border-radius:12px;}.play-drawer.right{right:8px;border-radius:12px;}
.play-drawer-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.play-drag-handle{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);color:#7a7568;cursor:move;touch-action:none;user-select:none;font-weight:900;}
.play-char-name{font-size:15px;color:#c9a96e;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.play-quick-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:6px 0;}
.play-restore{position:fixed;top:10px;right:10px;z-index:6700;padding:10px 12px;background:rgba(30,29,42,.9);border:1px solid rgba(201,169,110,.35);border-radius:10px;color:#c9a96e;font-family:'Cinzel',Georgia,serif;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.55);zoom:var(--play-ui-scale,1);transform-origin:top right;}
.play-card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px;margin-bottom:8px;}
.play-drawer-content{container-type:inline-size;}
.play-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:8px;align-items:start;}
.play-card-grid.party-grid{grid-template-columns:repeat(auto-fit,minmax(min(100%,160px),1fr));}
.play-card-grid.reference-grid{grid-template-columns:repeat(auto-fit,minmax(min(100%,185px),1fr));}
.play-card-grid.locations{grid-template-columns:repeat(auto-fit,minmax(min(100%,190px),1fr));}
.play-card-grid .play-card{margin-bottom:0;}
.play-full-row{grid-column:1/-1;}
.play-card select.play-select{max-width:100%;}
.play-mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;}
.play-mini-grid .inp{font-size:12px;padding:5px 7px;}
.play-mini-grid label{font-size:9px;}
.play-ff-collapsed{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}
.play-save-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:6px 0 8px;}
.play-save-chip{font-size:10.5px;color:#bbb;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:4px 5px;text-align:center;}
.play-compact-field{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.055);border-radius:8px;padding:7px;margin-top:5px;}
.check-render{font-size:13px;line-height:1.35;color:#d4cfc4;white-space:pre-wrap;}
.check-line{display:flex;align-items:flex-start;gap:7px;min-height:22px;padding:2px 0;}
.check-btn{flex:none;width:18px;height:18px;border-radius:4px;border:1px solid rgba(201,169,110,.35);background:rgba(255,255,255,.04);color:#c9a96e;font-size:12px;line-height:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;}
.freeform-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px;}
.freeform-tools{display:flex;gap:4px;flex:none;}
.freeform-tools button{padding:2px 6px;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#7a7568;font-size:10px;cursor:pointer;}

.play-resize-handle{position:absolute;right:5px;bottom:5px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(201,169,110,.16);border:1px solid rgba(201,169,110,.34);color:#c9a96e;cursor:nwse-resize;touch-action:none;user-select:none;font-size:15px;line-height:1;z-index:20;box-shadow:0 4px 14px rgba(0,0,0,.35);}
.play-drawer.right .play-resize-handle{left:5px;right:auto;cursor:nesw-resize;}
.play-scale-group{display:inline-flex;align-items:center;gap:3px;padding:2px 4px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.035);}
.play-scale-group .play-btn{height:24px;padding:0 6px;font-size:10px;}
.global-ui-scale{display:inline-flex;align-items:center;gap:3px;padding:2px 4px;border:1px solid rgba(255,255,255,.08);border-radius:7px;background:rgba(255,255,255,.025);}
.global-ui-scale button{height:24px;min-width:25px;padding:0 6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:5px;color:#7a7568;cursor:pointer;font-family:'Cinzel',Georgia,serif;font-size:10px;font-weight:800;}
.global-ui-scale span{font-size:10px;color:#7a7568;font-family:'Cinzel',Georgia,serif;white-space:nowrap;}

@media(max-width:620px){.play-topbar{top:4px;left:4px;right:4px;padding:5px;gap:4px;border-radius:8px}.play-mini-topbar{top:4px;left:4px;padding:5px;border-radius:8px}.play-select,.play-btn{height:27px;font-size:10px;padding:0 6px;border-radius:6px}.play-select{max-width:112px}.play-drawer{top:58px;bottom:auto;max-height:50vh;width:min(280px,66vw);padding:6px;font-size:12px}.play-drawer.left{left:6px;right:auto}.play-drawer.right{right:6px;left:auto}.play-drawer .inp{font-size:11px;padding:5px 7px}.play-drawer .cin{font-size:.86em}.play-char-name{font-size:13px}.play-drawer-head{margin-bottom:6px}.play-card{padding:6px;border-radius:8px;margin-bottom:5px}.play-card .hp-minus,.play-card .hp-plus{padding:3px 0;min-width:28px!important}.play-card .inp-sm{width:42px!important;padding:3px 4px}.play-toolstrip{bottom:6px;padding:5px;gap:4px;max-width:calc(100vw - 12px)}.play-side-tab{font-size:0;padding:10px 6px;min-height:46px}.play-left-tab::after{content:'☰';font-size:18px}.play-right-tab::after{content:'⌖';font-size:18px}.freeform-tools button{padding:2px 5px;font-size:9.5px}.play-map-pad{padding:82px 10px 86px}.play-shell.ui-hidden .play-map-pad{padding:82px 10px 86px}.play-restore{top:8px;right:8px;padding:9px 10px;font-size:12px}.play-save-grid{grid-template-columns:repeat(5,1fr)}.play-save-chip{font-size:8.5px;padding:3px 1px}.play-mini-grid{grid-template-columns:1fr 1fr}.play-mini-grid .inp{font-size:11px;padding:4px 6px}.check-render{font-size:12px}.lbl{font-size:9px}.play-scale-group .play-btn{height:22px;font-size:9px;padding:0 5px}.play-resize-handle{width:22px;height:22px}.global-ui-scale span{display:none}.global-ui-scale button{height:23px;min-width:23px;padding:0 5px}.play-card-grid{grid-template-columns:repeat(auto-fit,minmax(min(100%,170px),1fr));gap:6px}.play-card-grid.party-grid{grid-template-columns:repeat(auto-fit,minmax(min(100%,145px),1fr));}.play-card-grid.reference-grid,.play-card-grid.locations{grid-template-columns:repeat(auto-fit,minmax(min(100%,165px),1fr));}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const ABILITIES=[{key:"str",label:"STR"},{key:"dex",label:"DEX"},{key:"con",label:"CON"},{key:"int",label:"INT"},{key:"wis",label:"WIS"},{key:"cha",label:"CHA"}];
const SAVES=[{key:"save_dd",label:"Death"},{key:"save_wr",label:"Wands"},{key:"save_ph",label:"Paralysis"},{key:"save_bb",label:"Breath"},{key:"save_spell",label:"Spell"},{key:"save_mr",label:"M.Res"}];
const SPEEDS=[40,30,20,10];
const DICE_DEF=[{sides:4,label:"d4",color:"#8b5cf6"},{sides:6,label:"d6",color:"#3b82f6"},{sides:8,label:"d8",color:"#10b981"},{sides:10,label:"d10",color:"#f59e0b"},{sides:12,label:"d12",color:"#ef4444"},{sides:20,label:"d20",color:"#c9a96e"}];

function defaultTurnTracker(){
  return {
    active:"dungeon",
    open:false,
    dungeon:{name:"Dungeon",turn:0,resources:[{name:"Torches",qty:3,dur:6},{name:"Oil",qty:1,dur:24}],wanderEvery:2},
    overland:{name:"Overland",turn:0,resources:[{name:"Rations",qty:7,dur:1},{name:"Water",qty:7,dur:1}],wanderEvery:1}
  };
}
function cleanNum(v, fallback=0){
  const n=Number(v);
  return Number.isFinite(n)?Math.max(0,Math.floor(n)):fallback;
}
function normalizeTurnMode(src, fallback){
  const base=fallback||{name:"Turns",turn:0,resources:[],wanderEvery:0};
  const mode={...(base||{}),...(src||{})};
  mode.name=String(mode.name||base.name||"Turns");
  mode.turn=cleanNum(mode.turn,0);
  mode.wanderEvery=cleanNum(mode.wanderEvery,base.wanderEvery||0);
  mode.resources=Array.isArray(mode.resources)?mode.resources.map(r=>({
    name:String((r&&r.name)||"Resource"),
    qty:cleanNum(r&&r.qty,0),
    dur:cleanNum(r&&r.dur,0)
  })):[];
  return mode;
}
function normalizeTurnTracker(){
  const def=defaultTurnTracker();
  const src=state.turnTracker||{};
  state.turnTracker={
    active:["dungeon","overland"].includes(src.active)?src.active:"dungeon",
    open:!!src.open,
    dungeon:normalizeTurnMode(src.dungeon,def.dungeon),
    overland:normalizeTurnMode(src.overland,def.overland)
  };
}

const MapDB={
  _db:null,_name:"ose-maps-db",
  open(){if(this._db)return Promise.resolve(this._db);return new Promise((ok,no)=>{const r=indexedDB.open(this._name,1);r.onupgradeneeded=e=>e.target.result.createObjectStore("maps");r.onsuccess=e=>{this._db=e.target.result;ok(this._db);};r.onerror=()=>no(r.error);});},
  async get(key){const db=await this.open();return new Promise((ok,no)=>{const r=db.transaction("maps","readonly").objectStore("maps").get(key);r.onsuccess=()=>ok(r.result||null);r.onerror=()=>ok(null);});},
  async set(key,val){const db=await this.open();return new Promise((ok,no)=>{const tx=db.transaction("maps","readwrite");tx.objectStore("maps").put(val,key);tx.oncomplete=()=>ok();tx.onerror=()=>no(tx.error);});},
  async del(key){const db=await this.open();return new Promise((ok,no)=>{const tx=db.transaction("maps","readwrite");tx.objectStore("maps").delete(key);tx.oncomplete=()=>ok();tx.onerror=()=>ok();});}
};
function compressImage(dataUrl,maxW,quality){
  return new Promise(ok=>{const img=new Image();img.onload=()=>{
    const scale=Math.min(1,maxW/img.width);const c=document.createElement("canvas");
    c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    ok(c.toDataURL("image/jpeg",quality));
  };img.src=dataUrl;});
}
function isSvgUpload(file,dataUrl){
  const name=(file&&file.name?file.name:"").toLowerCase();
  const type=(file&&file.type?file.type:"").toLowerCase();
  const data=String(dataUrl||"").slice(0,80).toLowerCase();
  return name.endsWith(".svg")||type.includes("svg")||data.startsWith("data:image/svg");
}
async function prepareMapImage(file,dataUrl){
  return isSvgUpload(file,dataUrl)?dataUrl:await compressImage(dataUrl,2000,0.75);
}

function render(){
  const __sx=window.scrollX||0,__sy=window.scrollY||0;
  document.documentElement.style.setProperty('--global-ui-scale', state.globalUiScale||1);
  document.documentElement.style.setProperty('--play-ui-scale', state.playUiScale||1);
  document.body.classList.toggle("play-mode-active",!!state.playMode);
  document.getElementById("app").innerHTML=renderApp();
  bindEvents();
  if(state.playMode){
    const slot=playMapSlot();
    if(slot!=="dungeon"){
      const refresh=()=>{applyZoom();positionPinPopup();};
      requestAnimationFrame(refresh);setTimeout(refresh,80);
      const img=document.getElementById("map-img");
      if(img&&!img.complete)img.addEventListener("load",refresh,{once:true});
    }else{
      setTimeout(()=>{const el=document.getElementById("dungeon-inner");if(el)el.style.width=dungeonZoomVal*100+"%";const lbl=document.getElementById("dungeon-zoom-label");if(lbl)lbl.textContent=Math.round(dungeonZoomVal*100)+"%";},0);
    }
    return;
  }
  if(state.tab==="map"&&state.mapTab!=="dungeon"){
    const refresh=()=>{applyZoom();positionPinPopup();};
    requestAnimationFrame(refresh);
    setTimeout(refresh,80);
    const img=document.getElementById("map-img");
    if(img&&!img.complete)img.addEventListener("load",refresh,{once:true});
  }
  if(state.tab==="map"&&state.mapTab==="dungeon")setTimeout(()=>{const el=document.getElementById("dungeon-inner");if(el)el.style.width=dungeonZoomVal*100+"%";const lbl=document.getElementById("dungeon-zoom-label");if(lbl)lbl.textContent=Math.round(dungeonZoomVal*100)+"%";},0);
  requestAnimationFrame(()=>window.scrollTo(__sx,__sy));
  setTimeout(()=>window.scrollTo(__sx,__sy),0);
}

// ═══════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════
function renderApp(){
  if(state.loading) return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',Georgia,serif;color:#c9a96e;">Loading...</div>`;
  if(state.playMode) return `${renderPlayMode()}${state.playUiHidden?"":renderTurnTracker()+renderDiceFAB()}${state.diceToast?renderDiceToast():""}${playMapSlot()!=="dungeon"&&state.editingPin!==null?renderPinPopup(playMapSlot()):""}`;
  return `
  <div style="min-height:100vh;">
    ${renderHeader()}
    ${renderTabs()}
    <div style="padding:12px 12px 80px;">
      ${state.tab==="party"?renderPartyTab():""}
      ${state.tab==="map"?renderMapTab():""}
      ${state.tab==="retainers"?renderRetainersTab():""}
      ${state.tab==="npcs"?renderNpcsTab():""}
      ${state.tab==="notes"?renderNotesTab():""}
      ${state.tab==="animals"?renderAnimalsTab():""}
      ${state.tab==="locations"?renderLocations():""}
    </div>
    <div style="padding:12px 16px;margin-top:20px;border-top:1px solid #1a1a2e;text-align:center;">
      <div style="font-size:8px;color:#333;line-height:1.6;">Icons: Banner by Suharsono, Horse Head by Icons Producer, Manuscript by Bieu Tuong, Theater Mask by Afrison, Helmet by Zahroe, D20 by Sanjaya, Tent by RF_Design, Waypoint by Ghiyats Mujtaba, Tower by Simon Child, Dungeon by Priyanka, Ruins by Ian Rahmadi Kurniawan, Temple by Kiki Nickholas, Campsite by Jino, Beer by Alexander Skowalsky, Question by Agung Rama — all from <a href="https://thenounproject.com" target="_blank" style="color:#555;text-decoration:none;">Noun Project</a> (CC BY 3.0)</div>
    </div>
    ${renderTurnTracker()}${renderDiceFAB()}
    ${state.diceToast?renderDiceToast():""}
    ${state.tab==="map"&&state.mapTab!=="dungeon"&&state.editingPin!==null?renderPinPopup(state.mapTab):""}
  </div>`;
}

function renderHeader(){
  return `<div style="padding:10px 14px;border-bottom:1px solid #2a2735;display:flex;align-items:center;justify-content:space-between;">
    <div><h1 class="cin" style="font-size:18px;font-weight:800;color:#c9a96e;letter-spacing:0.05em;">${ico("swords","#c9a96e",18)} Campaign Dashboard</h1>
    <div data-save-status style="font-size:10px;color:#555;margin-top:1px;">OSE / B·X — ${state.loading?"Loading...":state.saved?"✓ Saved":"Saving..."}</div></div>
    <div class="flex gap6">
      <div class="global-ui-scale"><button onclick="adjustGlobalUiScale(-0.05)">UI−</button><span>${Math.round((state.globalUiScale||1)*100)}%</span><button onclick="adjustGlobalUiScale(0.05)">UI+</button></div>
      <button onclick="openPlayMode(state.mapTab||'world')" class="btn cin" style="padding:5px 10px;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.32);border-radius:6px;color:#c9a96e;font-size:11px;font-weight:800;">▶ Play</button>
      <button onclick="exportData()" class="btn" style="padding:5px 10px;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.25);border-radius:6px;color:#c9a96e;font-size:11px;font-weight:600;">↓ Export</button>
      <button onclick="document.getElementById('import-file').click()" class="btn" style="padding:5px 10px;background:rgba(107,140,206,0.1);border:1px solid rgba(107,140,206,0.25);border-radius:6px;color:#6b8cce;font-size:11px;font-weight:600;">↑ Import</button>
      <input id="import-file" type="file" accept=".json" onchange="handleImport(event)" style="display:none;"/>
    </div>
  </div>`;
}

function renderTabs(){
  const tabs=[
    {id:"party",icon:ico("banner","#c9a96e",14),label:"Party"},
    {id:"map",icon:ico("map","#c9a96e",14),label:"Map"},
    {id:"retainers",icon:ico("people","#c9a96e",14),label:"Retainers"},
    {id:"npcs",icon:ico("masks","#c9a96e",16),label:"NPCs"},
    {id:"notes",icon:ico("scroll","#c9a96e",16),label:"Notes"},
    {id:"animals",icon:ico("horse","#c9a96e",14),label:"Animals"},{id:"locations",icon:ico("pin","#c9a96e",14),label:"Locations"},
  ];
  return `<div class="tab-bar">
    ${tabs.map(t=>`<button class="tab-btn ${state.tab===t.id?"active":""}" onclick="setTab('${t.id}')">${t.icon} ${t.label}</button>`).join("")}
  </div>`;
}

// ── PARTY TAB ──
function renderPartyTab(){
  return `<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));gap:12px;">
    ${state.party.map((c,i)=>renderCharCard(c,i)).join("")}
  </div>
  ${state.party.length<8?`<button class="add-btn" onclick="addChar()">+ Add Character</button>`:""}`;
}

function renderCharCard(c,i){
  const col=hpColor(c.hp_current,c.hp_max);
  const pct=hpPct(c.hp_current,c.hp_max);
  return `<div class="card">
    <div style="margin-bottom:10px;border-bottom:1px solid #2a2735;padding-bottom:8px;">
      <div class="flex gap8">
        <input value="${esc(c.char_name)}" onchange="updateChar(${i},'char_name',this.value)" placeholder="Character ${i+1}"
          style="flex:1;background:transparent;border:none;color:#c9a96e;font-size:20px;font-family:'Cinzel',Georgia,serif;font-weight:700;outline:none;"/>
        ${state.party.length>1?`<button class="remove-btn" onclick="removeChar(${i})">✕</button>`:""}
      </div>
      <div class="flex gap8" style="margin-top:3px;font-size:12px;color:#7a7568;">
        <span>${esc(c.class)||"No Class"}</span><span>·</span><span>Lvl ${c.level}</span>
        ${c.alignment?`<span>·</span><span>${esc(c.alignment)}</span>`:""}
      </div>
    </div>
    <div class="mb10">
      <div class="flex gap8 mb6">
        <span class="cin" style="font-size:11px;color:#7a7568;font-weight:700;">HP</span>
        <span class="cin" style="font-size:20px;font-weight:800;color:${col};">${c.hp_current}</span>
        <span style="color:#555;">/</span><span style="font-size:14px;color:#7a7568;">${c.hp_max}</span>
        <div style="flex:1;"></div>
        <span class="cin" style="font-size:12px;color:#7a7568;">AC <strong style="color:#d4cfc4;font-size:16px;">${c.ac}</strong></span>
      </div>
      <div class="hp-bar-track"><div class="hp-bar-fill" style="width:${pct}%;background:${col};"></div></div>
      <div class="flex gap4">
        <button class="hp-minus" onclick="updateChar(${i},'hp_current',Math.max(0,${c.hp_current}-1))">🩸 −1</button>
        <button class="hp-plus" onclick="updateChar(${i},'hp_current',Math.min(${c.hp_max},${c.hp_current}+1))">💚 +1</button>
        <button class="hp-rest" onclick="restChar(${i})">${ico("tent","#7a7568",14)}<span style="vertical-align:middle;"> Rest</span></button>
      </div>
    </div>
    ${renderSection("char",i,"combat",ico("swords","#c44040",14),"Combat","#c44040",`
      <div class="grid2">
        ${field("HP Max",c.hp_max,"number",`updateChar(${i},'hp_max',+this.value)`)}
        ${field("HP Current",c.hp_current,"number",`updateChar(${i},'hp_current',+this.value)`)}
        ${field("AC",c.ac,"number",`updateChar(${i},'ac',+this.value)`)}
        ${field("ATK Bonus",c.atk,"number",`updateChar(${i},'atk',+this.value)`)}
      </div>
      <label class="lbl">Encounter Speed</label>
      <div class="flex gap4">
        ${SPEEDS.map(s=>`<button class="speed-btn ${c.encounter_speed===s?"active":""}" onclick="updateChar(${i},'encounter_speed',${s});render();">${s}'</button>`).join("")}
      </div>
    `)}
    ${renderSection("char",i,"identity",ico("scroll","#6b8cce",16),"Identity","#6b8cce",`
      ${field("Name",c.char_name,"text",`updateChar(${i},'char_name',this.value)`)}
      <div class="grid2">
        ${field("Class",c.class,"text",`updateChar(${i},'class',this.value)`)}
        ${field("Level",c.level,"number",`updateChar(${i},'level',+this.value)`)}
      </div>
      ${field("Background",c.background,"text",`updateChar(${i},'background',this.value)`)}
      ${field("Alignment",c.alignment,"text",`updateChar(${i},'alignment',this.value)`)}
      <div class="grid2">
        ${field("XP",c.xp,"number",`updateChar(${i},'xp',+this.value)`)}
        ${field("Next Level",c.next_level,"number",`updateChar(${i},'next_level',+this.value)`)}
      </div>
    `)}
    ${renderSection("char",i,"abilities",ico("chart","#9b7ed8",14),"Abilities","#9b7ed8",`
      <div class="grid2" style="gap:5px;">
        ${ABILITIES.map(a=>{
          const mod=bxMod(c[a.key]);
          const modCol=mod.startsWith("+")?  "#4a8c5c":mod==="0"?"#555":"#c44040";
          return `<div class="flex gap6" style="padding:5px 8px;background:rgba(255,255,255,0.02);border-radius:5px;">
            <span class="cin" style="font-size:11px;font-weight:800;color:#7a7568;width:28px;">${a.label}</span>
            <input class="inp inp-sm" type="number" value="${c[a.key]}" onchange="updateChar(${i},'${a.key}',+this.value)"/>
            <span style="font-size:15px;font-weight:800;min-width:24px;text-align:center;color:${modCol};">${mod}</span>
          </div>`;
        }).join("")}
      </div>
    `)}
    ${renderSection("char",i,"saves",ico("shield","#c9963e",14),"Saves","#c9963e",`
      <div class="grid2" style="gap:5px;">
        ${SAVES.map(s=>`<div class="flex gap6" style="padding:5px 8px;background:rgba(255,255,255,0.02);border-radius:5px;">
          <span style="font-size:10px;color:#7a7568;flex:1;font-weight:600;">${s.label}</span>
          <input class="inp inp-sm" type="number" value="${c[s.key]}" onchange="updateChar(${i},'${s.key}',+this.value)"/>
        </div>`).join("")}

// ── MAP LIBRARY HELPERS ──
function getMapsForSlot(slot){return state.mapLib.filter(m=>m.slot===slot);}
function getActiveMapMeta(slot){const id=state.activeMapId[slot];return state.mapLib.find(m=>m.id===id)||null;}
async function loadActiveMap(slot){
  const mid=state.activeMapId?.[slot];
  if(!mid){
    if(slot==="world")state.mapData=null;
    if(slot==="region")state.regionMap=null;
    return null;
  }
  try{
    const img=await MapDB.get("mapimg-"+mid);
    if(slot==="world")state.mapData=img||null;
    if(slot==="region")state.regionMap=img||null;
    return img||null;
  }catch(e){
    console.warn("Map load failed:",e);
    if(slot==="world")state.mapData=null;
    if(slot==="region")state.regionMap=null;
    return null;
  }
}
function getPinsForMap(mapId){return mapId&&state.pinsByMap[mapId]?state.pinsByMap[mapId]:[];}
function setPinsForMap(mapId,pins){if(mapId)state.pinsByMap[mapId]=pins;}
function getAllPins(){const all=[];state.mapLib.forEach(m=>{const pins=getPinsForMap(m.id);pins.forEach((p,pi)=>all.push({...p,pinIndex:pi,mapId:m.id,mapName:m.name,mapSlot:m.slot}));});return all;}
function getLocationRef(mapId,pinId){
  const map=state.mapLib.find(m=>m.id===mapId)||null;
  const pins=getPinsForMap(mapId);
  const idx=pins.findIndex(p=>String(p.id)===String(pinId));
  return {map,pins,idx,pin:idx>=0?pins[idx]:null};
}
function getFilteredLocations(){
  const q=(state.locationSearch||"").trim().toLowerCase();
  const all=getAllPins();
  if(!q)return all;
  return all.filter(loc=>[
    loc.name||"", loc.hex||"", loc.type||"", loc.mapName||"", loc.mapSlot||""
  ].some(v=>String(v).toLowerCase().includes(q)));
}

function updatePinById(mapId,pinId,field,value){
  const ref=getLocationRef(mapId,pinId);
  if(ref.pin)ref.pin[field]=value;
  scheduleSave();
  if(state.tab==="locations")render();
}
function togglePinLockById(mapId,pinId){
  const ref=getLocationRef(mapId,pinId);
  if(!ref.pin)return;
  ref.pin.unlocked=!ref.pin.unlocked;
  scheduleSave();render();
}
function removeLocationPin(mapId,pinId){
  const ref=getLocationRef(mapId,pinId);
  if(ref.idx>=0)ref.pins.splice(ref.idx,1);
  state.locationEditingMapId=null;
  state.locationEditingPinId=null;
  scheduleSave();render();
}
function jumpToPin(mapId,pinId){
  const ref=getLocationRef(mapId,pinId);
  if(!ref.map||!ref.pin)return;
  state.tab="map";state.mapTab=ref.map.slot;
  state.activeMapId[ref.map.slot]=mapId;
  loadActiveMap(ref.map.slot).then(()=>{
    const nextRef=getLocationRef(mapId,pinId);
    state.locationEditingPin=nextRef.idx>=0?nextRef.idx:null;
    state.editingPin=null;
    render();
  });
}

// ── PLAY MODE PROTOTYPE ──
function playMapSlot(){return state.playMapSlot||state.mapTab||"world";}
function openPlayMode(slot){state.playMode=true;state.playMapSlot=slot||state.mapTab||"world";state.mapTab=state.playMapSlot;state.playUiHidden=false;state.pinMode=null;state.editingPin=null;render();setTimeout(()=>centerPlayMap(state.playMapSlot==="dungeon"?"dungeon-container":"map-container"),60);}
function closePlayMode(){state.playMode=false;state.playUiHidden=false;state.playLeftOpen=false;state.playRightOpen=false;document.body.classList.remove("play-mode-active");render();}
function setPlayMapSlot(slot){state.playMapSlot=slot;state.mapTab=slot;state.pinMode=null;state.editingPin=null;state.locationEditingPin=null;render();setTimeout(()=>centerPlayMap(slot==="dungeon"?"dungeon-container":"map-container"),60);}
async function setPlayActiveMap(slot,mapId){state.playMapSlot=slot;state.mapTab=slot;await switchMap(slot,mapId);}
function setPlayUiHidden(v){
  const cont=playScrollEl();
  const rx=cont?((cont.scrollLeft+cont.clientWidth/2)/Math.max(1,cont.scrollWidth)):0.5;
  const ry=cont?((cont.scrollTop+cont.clientHeight/2)/Math.max(1,cont.scrollHeight)):0.5;
  state.playUiHidden=!!v;if(v){state.playLeftOpen=false;state.playRightOpen=false;}
  render();
  requestAnimationFrame(()=>{const next=playScrollEl();if(!next)return;next.scrollLeft=Math.max(0,rx*next.scrollWidth-next.clientWidth/2);next.scrollTop=Math.max(0,ry*next.scrollHeight-next.clientHeight/2);});
}
function clampUiScale(v){return Math.max(0.55,Math.min(1.35,Math.round((Number(v)||1)*100)/100));}
function adjustPlayUiScale(delta){state.playUiScale=clampUiScale((state.playUiScale||1)+delta);scheduleSave();render();}
function adjustGlobalUiScale(delta){state.globalUiScale=clampUiScale((state.globalUiScale||1)+delta);scheduleSave();render();}

function playCurrentMapId(){const slot=playMapSlot();return slot==="dungeon"?"dungeon":state.activeMapId[slot];}

function playScrollEl(){return document.getElementById(playMapSlot()==="dungeon"?"dungeon-container":"map-container");}
function playInnerEl(){return document.getElementById(playMapSlot()==="dungeon"?"dungeon-inner":"map-inner");}
function playZoom(delta){
  const sc=playScrollEl();
  const rx=sc?((sc.scrollLeft+sc.clientWidth/2)/Math.max(1,sc.scrollWidth)):0.5;
  const ry=sc?((sc.scrollTop+sc.clientHeight/2)/Math.max(1,sc.scrollHeight)):0.5;
  if(playMapSlot()==='dungeon'){
    dungeonZoomVal=Math.max(0.25,Math.min(4,dungeonZoomVal+delta));
    const el=document.getElementById('dungeon-inner');if(el)el.style.width=dungeonZoomVal*100+'%';
    const lbl=document.getElementById('dungeon-zoom-label');if(lbl)lbl.textContent=Math.round(dungeonZoomVal*100)+'%';
  }else{
    currentZoom=Math.max(0.25,Math.min(4,currentZoom+delta));
    applyZoom();
  }
  requestAnimationFrame(()=>{const next=playScrollEl();if(!next)return;next.scrollLeft=Math.max(0,rx*next.scrollWidth-next.clientWidth/2);next.scrollTop=Math.max(0,ry*next.scrollHeight-next.clientHeight/2);});
}

function updatePlayHp(kind,i,field,val){
  const arr=kind==='party'?state.party:state.retainers;
  if(!arr[i])return;
  const n=parseInt(val,10);
  arr[i][field]=Number.isFinite(n)?n:0;
  if(field==='hp_max'&&arr[i].hp_current>arr[i].hp_max&&arr[i].hp_max>0)arr[i].hp_current=arr[i].hp_max;
  scheduleSave();render();
}
function bumpPlayHp(kind,i,delta){
  const arr=kind==='party'?state.party:state.retainers;
  if(!arr[i])return;
  const max=Number(arr[i].hp_max)||0;
  const cur=Number(arr[i].hp_current)||0;
  let next=cur+delta;
  if(max>0)next=Math.min(max,next);
  next=Math.max(-10,next);
  arr[i].hp_current=next;
  scheduleSave();render();
}

let playDrawerDrag=null;
function playScale(){return Math.max(0.5,Number(state.playUiScale)||1);}
function playVisualToLayout(v){return v/playScale();}
function playLayoutToVisual(v){return v*playScale();}
function playDrawerStyle(side){
  const pos=state.playDrawerPos&&state.playDrawerPos[side];
  const size=state.playDrawerSize&&state.playDrawerSize[side];
  let out='';
  // Positions are stored in viewport/screen CSS pixels. Width/height are stored
  // as unscaled layout pixels so smaller UI scale can fit more grid columns.
  if(pos) out+=`left:${pos.x}px;top:${pos.y}px;right:auto;bottom:auto;`;
  if(size) out+=`width:${size.w}px;height:${size.h}px;bottom:auto;max-width:none;max-height:none;`;
  return out;
}
function getPanelVisualRect(panel){
  const r=panel.getBoundingClientRect();
  return {left:r.left,top:r.top,right:r.right,bottom:r.bottom,width:r.width,height:r.height};
}
function startPlayDrawerDrag(e,side){
  e.preventDefault();e.stopPropagation();
  const panel=e.currentTarget.closest('.play-drawer');if(!panel)return;
  const r=getPanelVisualRect(panel);
  try{e.currentTarget.setPointerCapture(e.pointerId);}catch(err){}
  playDrawerDrag={side,dx:e.clientX-r.left,dy:e.clientY-r.top,visualW:r.width,visualH:r.height};
  document.body.classList.add('dragging');
  window.addEventListener('pointermove',movePlayDrawerDrag,{passive:false});
  window.addEventListener('pointerup',endPlayDrawerDrag,{once:true});
}
function clampPlayPanelPos(x,y,visualW,visualH){
  const margin=6;
  const minVisible=58;
  const minX=Math.min(margin, window.innerWidth - visualW - margin);
  const maxX=Math.max(margin, window.innerWidth - minVisible);
  const minY=margin;
  const maxY=Math.max(margin, window.innerHeight - minVisible);
  return {x:Math.round(Math.max(minX,Math.min(maxX,x))), y:Math.round(Math.max(minY,Math.min(maxY,y)))};
}
function movePlayDrawerDrag(e){
  if(!playDrawerDrag)return;e.preventDefault();

  if(type==="enemy")return`<svg width="${s}" height="${s}" viewBox="0 0 20 20"><circle cx="10" cy="8" r="6" fill="none" stroke="${color}" stroke-width="1.5"/><circle cx="7.5" cy="7" r="1.5" fill="${color}"/><circle cx="12.5" cy="7" r="1.5" fill="${color}"/><path d="M7 12.5h6v2.5l-1.5-1-1.5 1-1.5-1-1.5 1z" fill="${color}"/></svg>`;

  return"";
}

// ── SHARED COMPONENTS ──
function field(label,value,type,onchange){
  return `<div class="mb8"><label class="lbl">${label}</label>
    <input class="inp${type==="number"?" inp-sm":""}" type="${type==="number"?"number":"text"}" value="${esc(value)}" onchange="${onchange}" ${type==="number"?'style="width:100%;text-align:center;font-weight:700;"':""}/></div>`;
}
function textArea(label,value,onchange){
  return `<div class="mb8"><label class="lbl">${label}</label>
    <textarea class="inp ta" rows="3" onchange="${onchange}">${esc(value)}</textarea></div>`;
}

function renderSection(prefix,index,name,icon,title,accent,content){
  const key=secKey(prefix,index,name);
  const open=!!state.openSections[key];
  return `<div class="mb6">
    <button class="section-btn" style="color:${accent};" onclick="toggleSection('${key}')">
      <span>${icon}</span><span style="flex:1;text-align:left;">${title}</span>
      <span style="font-size:9px;opacity:0.4;">${open?"▼":"▶"}</span>
    </button>
    ${open?`<div class="section-body" style="border-left:2px solid ${accent}22;">${content}</div>`:""}
  </div>`;
}

function renderSpellSlots(slots,prefix,charIdx){
  const safe=slots&&slots.length===6?slots:emptySlots();
  return safe.map((slot,i)=>{

        ${Array.from({length:slot.max},(_,j)=>{

// Spell slots
function adjustSlotMax(prefix,ci,si,delta){
  const arr=prefix==="char"?state.party:state.retainers;
  const slots=arr[ci].spell_slots||emptySlots();
  slots[si].max=Math.max(0,Math.min(6,slots[si].max+delta));
  slots[si].used=Math.min(slots[si].used,slots[si].max);
  arr[ci].spell_slots=slots;
  scheduleSave();render();
}
function toggleSlotUse(prefix,ci,si,wasFilled){
  const arr=prefix==="char"?state.party:state.retainers;
  const slots=arr[ci].spell_slots||emptySlots();
  if(wasFilled) slots[si].used=Math.min(slots[si].max,slots[si].used+1);

// Map
let currentZoom=1;
function preservePlayScroll(containerId,fn){
  const cont=document.getElementById(containerId);
  if(!state.playMode||!cont){fn();return;}
  const oldW=Math.max(1,cont.scrollWidth), oldH=Math.max(1,cont.scrollHeight);
  const cx=(cont.scrollLeft+cont.clientWidth/2)/oldW;
  const cy=(cont.scrollTop+cont.clientHeight/2)/oldH;
  fn();
  requestAnimationFrame(()=>{
    cont.scrollLeft=Math.max(0,cx*cont.scrollWidth-cont.clientWidth/2);
    cont.scrollTop=Math.max(0,cy*cont.scrollHeight-cont.clientHeight/2);
  });
}
function centerPlayMap(containerId){
  if(!state.playMode)return;
  const cont=document.getElementById(containerId);
  if(!cont)return;
  requestAnimationFrame(()=>{
    cont.scrollLeft=Math.max(0,(cont.scrollWidth-cont.clientWidth)/2);
    cont.scrollTop=Math.max(0,(cont.scrollHeight-cont.clientHeight)/2);
  });
}
function updateTokenSize(val){state.tokenSize=val;const t=document.getElementById("party-token");if(t){t.style.width=val+"px";t.style.height=val+"px";t.style.borderWidth=Math.max(1,Math.round(val/9))+"px";const svg=t.querySelector("svg");if(svg){const s=Math.max(6,Math.round(val*0.45));svg.setAttribute("width",s);svg.setAttribute("height",s);}}scheduleSave();}
function updatePinSize(val){state.pinSize=val;scheduleSave();render();}
function mapZoom(delta){preservePlayScroll('map-container',()=>{currentZoom=Math.max(0.25,Math.min(4,currentZoom+delta));applyZoom();});}
function applyZoom(){const el=document.getElementById("map-inner");if(el)el.style.width=`${currentZoom*100}%`;const lbl=document.getElementById("zoom-label");if(lbl)lbl.textContent=Math.round(currentZoom*100)+"%";setTimeout(positionPinPopup,0);}
function mapFit(){
  const img=document.getElementById("map-img");const cont=document.getElementById("map-container");
  if(!img||!img.naturalWidth||!cont) return;
  const aW=state.playMode?Math.max(240,cont.clientWidth-36):cont.clientWidth;const aH=state.playMode?Math.max(240,cont.clientHeight-170):window.innerHeight-220;
  const ratio=img.naturalHeight/img.naturalWidth;
  const hFull=aW*ratio;
  currentZoom=hFull<=aH?1:Math.max(0.25,aH/hFull);
  applyZoom();
  centerPlayMap("map-container");
}

async function switchMap(slot,mapId){

}

  scheduleSave();render();
}
function handleMapUpload(e,which){
  const file=e.target.files?.[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const compressed=await prepareMapImage(file,ev.target.result);
    const mid=genId();const fname=file.name.replace(/\.[^.]+$/,"").substring(0,30)||"Map";

function normalizePinLocks(){
  if(!state.pinsByMap)return;
  Object.entries(state.pinsByMap).forEach(([mid,pins])=>{
    if(!Array.isArray(pins))return;
    pins.forEach((p,i)=>{
      if(typeof p.unlocked!=="boolean")p.unlocked=false;
      if(!p.size)p.size=state.pinSize;
    });
  });
  if(state.unlockedPinMap&&state.pinsByMap[state.unlockedPinMap]&&state.pinsByMap[state.unlockedPinMap][state.unlockedPin]){
    state.pinsByMap[state.unlockedPinMap][state.unlockedPin].unlocked=true;
  }
  clearUnlockedPin();
}
function positionPinPopup(){
  const pop=document.querySelector('[data-pin-popup="1"]');
  const img=document.getElementById("map-img");
  if(!pop||!img)return;
  const which=pop.dataset.pinMap;const pi=+pop.dataset.pinIdx;
  const mid=state.activeMapId[which];const arr=getPinsForMap(mid);const p=arr[pi];
  if(!p)return;
  const rect=img.getBoundingClientRect();
  const pr=pop.getBoundingClientRect();
  const pad=10;const gap=12;const w=pr.width||180;const h=pr.height||118;
  let left=rect.left+(rect.width*((p.x||50)/100));
  let anchorTop=rect.top+(rect.height*((p.y||50)/100));
  left=Math.max(pad+w/2,Math.min(window.innerWidth-pad-w/2,left));
  const roomAbove=anchorTop-pad;
  const roomBelow=window.innerHeight-anchorTop-pad;
  const placeBelow=roomAbove<h+gap && roomBelow>=Math.min(h+gap,roomAbove);
  let top=anchorTop;
  if(placeBelow){
    pop.style.transform=`translate(-50%, ${gap}px)`;
    top=Math.max(pad,Math.min(window.innerHeight-pad-h-gap,anchorTop));
  }else{
    pop.style.transform=`translate(-50%, calc(-100% - ${gap}px))`;
    top=Math.max(pad+h+gap,Math.min(window.innerHeight-pad,anchorTop));
  }
  pop.style.left=left+"px";
  pop.style.top=top+"px";
}

let pinchDist=0;let pinchTarget=null;
function handlePinch(container,zoomGetter,zoomSetter){
  container.addEventListener("touchstart",e=>{if(e.touches.length===2){pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchTarget=container;}});
  container.addEventListener("touchmove",e=>{if(e.touches.length===2&&pinchTarget===container){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const delta=(d-pinchDist)/200;const nz=Math.max(0.25,Math.min(4,zoomGetter()+delta));zoomSetter(nz);pinchDist=d;}},{passive:false});
  container.addEventListener("touchend",()=>{pinchDist=0;pinchTarget=null;});
}

// Import / Export
async function exportData(){
  const data={party:state.party,retainers:state.retainers,npcs:state.npcs,notes:state.notes,animals:state.animals,tokenPos:state.tokenPos,regionToken:state.regionToken,tokenSize:state.tokenSize,pinSize:state.pinSize,mapLib:state.mapLib,activeMapId:state.activeMapId,pinsByMap:state.pinsByMap,turnTracker:state.turnTracker,unlockedPin:state.unlockedPin,unlockedPinMap:state.unlockedPinMap,dungeonMap:state.dungeonMap,dungeonPins:state.dungeonPins,dungeonCharNum:state.dungeonCharNum,dungeonIconSize:state.dungeonIconSize,playUiScale:state.playUiScale,globalUiScale:state.globalUiScale,playDrawerPos:state.playDrawerPos,playDrawerSize:state.playDrawerSize,playTopCollapsed:state.playTopCollapsed,playRightPanel:state.playRightPanel,playSessionNoteId:state.playSessionNoteId};
  // Include map images
  const mapImages={};for(const m of state.mapLib){try{const img=await MapDB.get("mapimg-"+m.id);if(img)mapImages[m.id]=img;}catch(e){}}
  data.mapImages=mapImages;
  if(state.dungeonMap)data.dungeonMapImg=state.dungeonMap;
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;
  a.download=`ose-campaign-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}
function handleImport(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.party){alert("Invalid save file.");return;}
      if(!confirm("Overwrite all current data with this save?"))return;
      state.party=d.party.map(c=>({...defaultChar(),...c}));
      state.retainers=(d.retainers||[]).map(r=>({...defaultRet(),...r}));
      state.npcs=(d.npcs||[]).map(n=>({...defaultNpc(),...n}));
      state.notes=(d.notes||[]).map(n=>({...defaultNote(),...n}));
      state.animals=(d.animals||[]).map(a=>({...defaultAnimal(),...a}));
      if(d.tokenPos) state.tokenPos=d.tokenPos;
      if(d.regionToken) state.regionToken=d.regionToken;
      if(d.tokenSize) state.tokenSize=d.tokenSize;if(d.pinSize) state.pinSize=d.pinSize;
      // Import map library
      if(d.mapLib){state.mapLib=d.mapLib;state.activeMapId=d.activeMapId||{world:null,region:null};state.pinsByMap=d.pinsByMap||{};}
      if(d.mapImages){for(const[mid,img]of Object.entries(d.mapImages)){await MapDB.set("mapimg-"+mid,img);}}
      // Legacy import
      if(d.mapData&&!d.mapLib){const wid=genId();state.mapLib.push({id:wid,name:"World Map",slot:"world"});state.activeMapId.world=wid;await MapDB.set("mapimg-"+wid,d.mapData);}
      if(d.regionMap&&!d.mapLib){const rid=genId();state.mapLib.push({id:rid,name:"Region Map",slot:"region"});state.activeMapId.region=rid;await MapDB.set("mapimg-"+rid,d.regionMap);}
      if(d.turnTracker) state.turnTracker={...defaultTurnTracker(),...d.turnTracker};
      normalizeTurnTracker();
      if(d.dungeonMapImg){state.dungeonMap=d.dungeonMapImg;await MapDB.set('dungeon-map',d.dungeonMapImg);}
      if(d.dungeonPins)state.dungeonPins=d.dungeonPins;
      if(d.dungeonCharNum)state.dungeonCharNum=d.dungeonCharNum;
      if(d.dungeonIconSize)state.dungeonIconSize=d.dungeonIconSize;
      if(d.playUiScale)state.playUiScale=clampUiScale(d.playUiScale);
      if(d.globalUiScale)state.globalUiScale=clampUiScale(d.globalUiScale);
      if(d.playDrawerPos)state.playDrawerPos=d.playDrawerPos;
      if(d.playDrawerSize)state.playDrawerSize=d.playDrawerSize;
      if(Object.prototype.hasOwnProperty.call(d,'playTopCollapsed'))state.playTopCollapsed=!!d.playTopCollapsed;
      if(d.playRightPanel)state.playRightPanel=d.playRightPanel;
      if(Object.prototype.hasOwnProperty.call(d,'playSessionNoteId'))state.playSessionNoteId=d.playSessionNoteId;
      normalizePinLocks();
      scheduleSave();
      if(state.activeMapId.world)await loadActiveMap("world");
      if(state.activeMapId.region)await loadActiveMap("region");
      render();
    }catch(err){alert("Failed to read save file.");}
  };
  reader.readAsText(file);e.target.value="";
}

let isDragging=false;

let playPan=null;
function startPlayPan(e,container){
  if(!state.playMode)return;
  if(state.pinMode||state.dungeonTool)return;
  if(e.target.closest('.map-pin,.dungeon-pin,#party-token,.pin-popup,.play-topbar,.play-toolstrip,.play-drawer,.play-side-tab,.dice-fab,.turn-fab,button,input,select,textarea'))return;
  if(container.scrollWidth<=container.clientWidth&&container.scrollHeight<=container.clientHeight)return;
  e.preventDefault();
  try{container.setPointerCapture(e.pointerId);}catch(_e){}
  container.classList.add('drag-panning');
  playPan={id:e.pointerId,el:container,x:e.clientX,y:e.clientY,left:container.scrollLeft,top:container.scrollTop};
}
function bindEvents(){
  const token=document.getElementById("party-token");
  if(token){
    token.onpointerdown=e=>{
      if(state.pinMode) return;
      e.preventDefault();
      isDragging=true;document.body.classList.add('dragging');
    };
  }
  const mapInner=document.getElementById("map-inner");
  if(mapInner){
    mapInner.onclick=e=>{
      if(state.pinMode){
        handleMapClick(e);
        return;
      }
    };
  }
  // Dungeon events
  const dungeonInner=document.getElementById("dungeon-inner");
  if(dungeonInner){
    dungeonInner.onclick=e=>{
      if(state.dungeonTool&&!e.target.closest(".dungeon-pin")){placeDungeonPin(e);}
    };
  }
  const dungeonImg=document.getElementById("dungeon-img");
  if(dungeonImg&&!dungeonImg.dataset.bound){dungeonImg.dataset.bound="1";dungeonImg.addEventListener("load",()=>setTimeout(applyDungeonZoom,50));}
  const mc=document.getElementById("map-container");
  if(mc){handlePinch(mc,()=>currentZoom,(z)=>{currentZoom=z;applyZoom();});mc.addEventListener("scroll",positionPinPopup,{passive:true});mc.onpointerdown=e=>startPlayPan(e,mc);}
  const dc=document.getElementById("dungeon-container");
  if(dc){handlePinch(dc,()=>dungeonZoomVal,(z)=>{dungeonZoomVal=z;const el=document.getElementById("dungeon-inner");if(el)el.style.width=z*100+"%";const lbl=document.getElementById("dungeon-zoom-label");if(lbl)lbl.textContent=Math.round(z*100)+"%";});dc.onpointerdown=e=>startPlayPan(e,dc);}

}

document.addEventListener("pointermove",e=>{
  if(playPan){e.preventDefault();playPan.el.scrollLeft=playPan.left-(e.clientX-playPan.x);playPan.el.scrollTop=playPan.top-(e.clientY-playPan.y);return;}
  if(draggingPinIdx!==null){
    e.preventDefault();
    const img=document.getElementById("map-img");if(!img)return;
    const rect=img.getBoundingClientRect();
    const x=Math.max(0,Math.min(100,((e.clientX-rect.left)/rect.width)*100));
    const y=Math.max(0,Math.min(100,((e.clientY-rect.top)/rect.height)*100));
    const mid=state.activeMapId[draggingPinSlot];const pins=getPinsForMap(mid);
    if(pins[draggingPinIdx]){pins[draggingPinIdx].x=x;pins[draggingPinIdx].y=y;
      const el=document.querySelector(`.map-pin[data-pin-idx="${draggingPinIdx}"]`);
      if(el){el.style.left=x+"%";el.style.top=y+"%";}
      if(state.editingPin===draggingPinIdx)positionPinPopup();
    }
    return;
  }
  if(dungeonDragIdx!==null){
    e.preventDefault();
    const img=document.getElementById("dungeon-img");if(!img)return;
    const rect=img.getBoundingClientRect();
    const x=Math.max(0,Math.min(100,((e.clientX-rect.left)/rect.width)*100));
    const y=Math.max(0,Math.min(100,((e.clientY-rect.top)/rect.height)*100));
    state.dungeonPins[dungeonDragIdx].x=x;state.dungeonPins[dungeonDragIdx].y=y;
    const el=document.querySelector(`.dungeon-pin[data-idx="${dungeonDragIdx}"]`);
    if(el){el.style.left=x+"%";el.style.top=y+"%";}
    return;
  }
  if(!isDragging) return;
  e.preventDefault();
  const img=document.getElementById("map-img");
  if(!img) return;
  const rect=img.getBoundingClientRect();
  const cx=e.clientX;const cy=e.clientY;
  const x=Math.max(0,Math.min(100,((cx-rect.left)/rect.width)*100));
  const y=Math.max(0,Math.min(100,((cy-rect.top)/rect.height)*100));
  if(state.mapTab==="world") state.tokenPos={x,y};
  else state.regionToken={x,y};
  const token=document.getElementById("party-token");
  if(token){token.style.left=x+"%";token.style.top=y+"%";}
});
function endPointerInteractions(){
  if(playPan){playPan.el.classList.remove('drag-panning');playPan=null;}
  if(isDragging){isDragging=false;document.body.classList.remove('dragging');scheduleSave();}
  if(draggingPinIdx!==null){draggingPinIdx=null;draggingPinSlot=null;document.body.classList.remove('dragging');scheduleSave();}
  if(dungeonDragIdx!==null){dungeonDragIdx=null;document.body.classList.remove('dragging');scheduleSave();}
}
document.addEventListener("pointerup",endPointerInteractions);
document.addEventListener("pointercancel",endPointerInteractions);
window.addEventListener("resize",positionPinPopup);

function normalizeDungeonTokens(){
  (state.dungeonPins||[]).forEach((p,i)=>{
    if(p.type==="char"){
      if(!p.name)p.name=`Token ${p.number||i+1}`;
      if(!p.size)p.size=state.dungeonIconSize||24;
    }
  });
}

// STORAGE
// ═══════════════════════════════════════════
let saveTimer=null;
function scheduleSave(){
  if(state.loading) return;
  state.saved=false;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      const data={party:state.party,retainers:state.retainers,npcs:state.npcs,notes:state.notes,animals:state.animals,tokenPos:state.tokenPos,regionToken:state.regionToken,tokenSize:state.tokenSize,pinSize:state.pinSize,mapLib:state.mapLib,activeMapId:state.activeMapId,pinsByMap:state.pinsByMap,turnTracker:state.turnTracker,unlockedPin:state.unlockedPin,unlockedPinMap:state.unlockedPinMap,dungeonMap:state.dungeonMap,dungeonPins:state.dungeonPins,dungeonCharNum:state.dungeonCharNum,dungeonIconSize:state.dungeonIconSize,playUiScale:state.playUiScale,globalUiScale:state.globalUiScale,playDrawerPos:state.playDrawerPos,playDrawerSize:state.playDrawerSize,playTopCollapsed:state.playTopCollapsed,playRightPanel:state.playRightPanel,playSessionNoteId:state.playSessionNoteId};
      localStorage.setItem(STORE_KEY,JSON.stringify(data));
      state.saved=true;
      const hdr=document.querySelector('[data-save-status]');
      if(hdr) hdr.textContent="OSE / B·X — ✓ Saved";
    }catch(e){console.warn("Storage save failed:",e);}
  },800);
}

// saveMap removed - maps now save on upload via MapDB.set("mapimg-"+id)

async function loadFromStorage(){
  try{
    const r={value:localStorage.getItem(STORE_KEY)};
    if(r?.value){
      const d=JSON.parse(r.value);
      if(d.party) state.party=d.party.map(c=>({...defaultChar(),...c}));
      if(d.retainers) state.retainers=d.retainers.map(r=>({...defaultRet(),...r}));
      if(d.npcs) state.npcs=d.npcs.map(n=>({...defaultNpc(),...n}));
      if(d.notes) state.notes=d.notes.map(n=>({...defaultNote(),...n}));
      if(d.animals) state.animals=d.animals.map(a=>({...defaultAnimal(),...a}));
      if(d.tokenPos) state.tokenPos=d.tokenPos;
      if(d.regionToken) state.regionToken=d.regionToken;
      if(d.tokenSize) state.tokenSize=d.tokenSize;if(d.pinSize) state.pinSize=d.pinSize;
      if(d.mapLib) state.mapLib=d.mapLib;
      if(d.activeMapId) state.activeMapId=d.activeMapId;
      if(d.pinsByMap) state.pinsByMap=d.pinsByMap;
      if(d.turnTracker) state.turnTracker={...defaultTurnTracker(),...state.turnTracker,...d.turnTracker};
      normalizeTurnTracker();
      if(Object.prototype.hasOwnProperty.call(d,"unlockedPin")) state.unlockedPin=d.unlockedPin;
      if(Object.prototype.hasOwnProperty.call(d,"unlockedPinMap")) state.unlockedPinMap=d.unlockedPinMap;
      if(d.dungeonPins) state.dungeonPins=d.dungeonPins;
      if(d.dungeonCharNum) state.dungeonCharNum=d.dungeonCharNum;
      if(d.playUiScale) state.playUiScale=clampUiScale(d.playUiScale);
      if(d.globalUiScale) state.globalUiScale=clampUiScale(d.globalUiScale);
      if(d.playDrawerPos) state.playDrawerPos=d.playDrawerPos;
      if(d.playDrawerSize) state.playDrawerSize=d.playDrawerSize;
      if(Object.prototype.hasOwnProperty.call(d,'playTopCollapsed')) state.playTopCollapsed=!!d.playTopCollapsed;
      if(d.playRightPanel) state.playRightPanel=d.playRightPanel;
      if(Object.prototype.hasOwnProperty.call(d,'playSessionNoteId')) state.playSessionNoteId=d.playSessionNoteId;
      // Migrate old format
      if(d.worldPins&&d.worldPins.length>0&&!d.mapLib){
        const wid=genId();state.mapLib.push({id:wid,name:"World Map",slot:"world"});state.activeMapId.world=wid;state.pinsByMap[wid]=d.worldPins;
      }
      if(d.regionPins&&d.regionPins.length>0&&!d.mapLib){
        const rid=genId();state.mapLib.push({id:rid,name:"Region Map",slot:"region"});state.activeMapId.region=rid;state.pinsByMap[rid]=d.regionPins;
      }
      normalizePinLocks();
    }
  }catch(e){console.warn("Storage load failed:",e);}
  // Load active maps from IndexedDB library
  if(state.activeMapId.world){try{const img=await MapDB.get("mapimg-"+state.activeMapId.world);if(img)state.mapData=img;}catch(e){}}
  if(state.activeMapId.region){try{const img=await MapDB.get("mapimg-"+state.activeMapId.region);if(img)state.regionMap=img;}catch(e){}}
  // Migrate from old single-map storage
  if(!state.activeMapId.world&&state.mapLib.length===0){
    try{const old=await MapDB.get(MAP_KEYS.world);if(old){const wid=genId();state.mapLib.push({id:wid,name:"World Map",slot:"world"});state.activeMapId.world=wid;state.mapData=old;await MapDB.set("mapimg-"+wid,old);}}catch(e){}
    try{const old=await window.storage.get(MAP_KEYS.world);if(old?.value){const wid=genId();state.mapLib.push({id:wid,name:"World Map",slot:"world"});state.activeMapId.world=wid;state.mapData=old.value;await MapDB.set("mapimg-"+wid,old.value);}}catch(e){}
  }
  if(!state.activeMapId.region&&getMapsForSlot("region").length===0){
    try{const old=await MapDB.get(MAP_KEYS.region);if(old){const rid=genId();state.mapLib.push({id:rid,name:"Region Map",slot:"region"});state.activeMapId.region=rid;state.regionMap=old;await MapDB.set("mapimg-"+rid,old);}}catch(e){}
    try{const old=await window.storage.get(MAP_KEYS.region);if(old?.value){const rid=genId();state.mapLib.push({id:rid,name:"Region Map",slot:"region"});state.activeMapId.region=rid;state.regionMap=old.value;await MapDB.set("mapimg-"+rid,old.value);}}catch(e){}
  }
  // Load dungeon map
  try{const dm=await MapDB.get("dungeon-map");if(dm){state.dungeonMap=dm;}}catch(e){}
  normalizeTurnTracker();
  normalizeDungeonTokens();state.loading=false;
  render();
}


// Request persistent storage
async function requestPersist(){
  if(navigator.storage&&navigator.storage.persist){
    const granted=await navigator.storage.persist();
    console.log("Storage persist:",granted?"granted":"denied");
    return granted;
  }
  return false;
}
requestPersist();
// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadFromStorage();
</script>
